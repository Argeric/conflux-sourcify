services:
  verification:
    image: node:22.22.0-libssl3
    mem_limit: 1536m
    memswap_limit: 1536m
    command: node /verification/server.js
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./:/verification
      - ./solc-repo/bin:/verification/solc-repo/bin
      - ./solc-repo/js:/verification/solc-repo/js
      - ./vyper-repo:/verification/vyper-repo
    env_file:
      - path: .env
    healthcheck:
      test: [ "CMD-SHELL", "free -m | awk '/Mem:/ {exit ($3 > 1500 ? 1 : 0)}'" ]
      interval: 10s
      retries: 3
      start_period: 30s

  monitor:
    image: node:22.22.0-libssl3
    command: node /verification/services/monitor/Monitor.js
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./:/verification
    env_file:
      - path: .env
